<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クーポン受け取り</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #6dd5ed, #2193b0);
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: white;
    border-radius: 20px;
    padding: 30px 24px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
  }
  h1 {
    font-size: 20px;
    color: #333;
    margin-bottom: 8px;
  }
  p.desc {
    font-size: 14px;
    color: #666;
    margin-bottom: 24px;
    line-height: 1.6;
  }
  input {
    width: 100%;
    box-sizing: border-box;
    padding: 14px;
    font-size: 16px;
    border: 2px solid #ddd;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #2193b0, #6dd5ed);
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.5;
  }
  #result {
    margin-top: 20px;
  }
  .coupon-box {
    background: #fff7e6;
    border: 2px dashed #ffa726;
    border-radius: 12px;
    padding: 20px;
    margin-top: 16px;
  }
  .coupon-code {
    font-size: 22px;
    font-weight: bold;
    color: #e65100;
    letter-spacing: 1px;
  }
  .error-box {
    color: #d32f2f;
    margin-top: 16px;
    font-size: 14px;
  }
  .loading {
    color: #999;
    font-size: 14px;
  }
  .confetti {
    position: fixed;
    top: -10px;
    width: 10px;
    height: 10px;
    opacity: 0.9;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(360deg);
      opacity: 0.3;
    }
  }
  .congrats {
    font-size: 18px;
    font-weight: bold;
    animation: bounce 0.6s ease;
  }
  @keyframes bounce {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }
  .coupon-code {
    cursor: pointer;
    transition: transform 0.15s;
    user-select: all;
  }
  .coupon-code:active {
    transform: scale(0.95);
  }
  .copy-hint {
    font-size: 12px;
    color: #2193b0;
    margin-top: 8px;
    font-weight: bold;
  }
  .emoji-particle {
    position: fixed;
    top: -30px;
    animation: fall-emoji linear forwards;
    pointer-events: none;
    z-index: 999;
  }
  @keyframes fall-emoji {
    to {
      transform: translateY(110vh) rotate(360deg);
      opacity: 0.2;
    }
  }
  .flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: white;
    opacity: 0.8;
    z-index: 998;
    pointer-events: none;
    animation: flash-fade 0.5s ease-out forwards;
  }
  @keyframes flash-fade {
    to { opacity: 0; }
  }
  .ticket {
    background: #fffdf8;
    border-radius: 16px;
    padding: 24px 20px;
    margin-top: 16px;
    position: relative;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    border: 2px solid #ffb74d;
    animation: bounce 0.6s ease;
  }
  .ticket::before, .ticket::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: #6dd5ed;
    border-radius: 50%;
    top: 50%;
    transform: translateY(-50%);
  }
  .ticket::before { left: -12px; }
  .ticket::after { right: -12px; }
  .ticket-header {
    font-size: 16px;
    font-weight: bold;
    color: #e65100;
  }
  .ticket-divider {
    border-top: 2px dashed #ffcc80;
    margin: 14px 0;
  }
  .ticket-discount {
    font-size: 26px;
    font-weight: 900;
    color: #d84315;
    margin-bottom: 14px;
  }
  .ticket-label {
    font-size: 12px;
    color: #999;
    margin-bottom: 4px;
  }
  .ticket-expiry {
    margin-top: 12px;
    font-size: 13px;
    color: #d32f2f;
    font-weight: bold;
    background: #ffebee;
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
  }
  .confetti-burst {
    position: fixed;
    opacity: 0.95;
    animation: burst-fly cubic-bezier(0.15, 0.6, 0.4, 1) forwards;
    pointer-events: none;
    z-index: 999;
  }
  .emoji-burst {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    animation: burst-fly cubic-bezier(0.15, 0.6, 0.4, 1) forwards;
  }
  @keyframes burst-fly {
    0% {
      transform: translate(0, 0) rotate(0deg);
      opacity: 1;
    }
    60% {
      opacity: 1;
    }
    100% {
      transform: translate(var(--dx), var(--dy)) rotate(540deg);
      opacity: 0;
    }
  }
</style>
</head>
<body>

<div class="card">
  <h1>🎁 期間限定クーポン 🎁</h1>
  <p class="desc">SNSの投稿に掲載されているキーワードを入力してください</p>

  <div id="formArea">
    <input type="text" id="keywordInput" placeholder="キーワードを入力">
    <button id="submitBtn" onclick="submitKeyword()">送信する</button>
  </div>

  <div id="result"></div>
</div>

<script>
  let userId = "";
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxGO-eJaWiJUO1Us2aP2vPUvlTSW-u7Z2q74NpUZWS2GuZqFrUnXcRwA6zt6hAIQ5lc/exec";

  document.getElementById("result").innerHTML = "<p class='loading'>LIFF初期化中...</p>";

  liff.init({ liffId: "2010460051-Ad6VtlEi" }).then(() => {
    if (!liff.isLoggedIn()) {
      liff.login();
    } else {
      liff.getProfile().then(profile => {
        userId = profile.userId;
        document.getElementById("result").innerHTML = "";
      }).catch(err => {
        document.getElementById("result").innerHTML = "<div class='error-box'>プロフィール取得エラー: " + JSON.stringify(err) + "</div>";
      });
    }
  }).catch(err => {
    document.getElementById("result").innerHTML = "<div class='error-box'>初期化エラー: " + JSON.stringify(err) + "</div>";
  });

  function submitKeyword() {
    const keyword = document.getElementById("keywordInput").value.trim();
    if (!keyword) {
      alert("キーワードを入力してください");
      return;
    }
    if (!userId) {
      alert("ユーザー情報の取得中です。少し待ってから再度お試しください。");
      return;
    }

    document.getElementById("submitBtn").disabled = true;
    document.getElementById("result").innerHTML = "<p class='loading'>確認中...</p>";

    fetch(GAS_API_URL, {
      method: "POST",
      body: JSON.stringify({ userId: userId, keyword: keyword }),
      headers: { "Content-Type": "text/plain" }
    })
      .then(res => res.json())
      .then(onResult)
      .catch(onError);
  }

  function onResult(res) {
    document.getElementById("submitBtn").disabled = false;

    if (res.success) {
      document.getElementById("formArea").style.display = "none";
      document.getElementById("result").innerHTML = `
        <div class="ticket">
          <div class="ticket-header">🎉 おめでとうございます！ 🎉</div>
          <div class="ticket-divider"></div>
          <div class="ticket-discount">${res.discount || "特典クーポン"}</div>
          <div class="ticket-label">ご利用コード</div>
          <div class="coupon-code" id="couponCode" onclick="copyCoupon()">${res.couponCode}</div>
          <p class="copy-hint" id="copyHint">タップしてコピー 📋</p>
          ${res.expiryText ? `<div class="ticket-expiry">有効期限：${res.expiryText}</div>` : ""}
          <p style="font-size:12px; color:#999; margin-top:14px;">このコードを自社サイトのクーポン欄に入力してください</p>
        </div>
      `;
      launchConfetti();
      launchFlash();
    } else {
      document.getElementById("result").innerHTML = "<div class='error-box'>" + res.message + "</div>";
    }
  }

  function copyCoupon() {
    const code = document.getElementById("couponCode").innerText;
    navigator.clipboard.writeText(code).then(() => {
      const hint = document.getElementById("copyHint");
      hint.innerText = "✅ コピーしました！";
      hint.style.color = "#2e7d32";
      setTimeout(() => {
        hint.innerText = "タップしてコピー 📋";
        hint.style.color = "";
      }, 2000);
    });
  }

  function launchFlash() {
    const flash = document.createElement("div");
    flash.className = "flash";
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 500);
  }

  function launchConfetti() {
    const colors = ["#f94144", "#f3722c", "#f9c74f", "#90be6d", "#577590", "#f8961e", "#43aa8b"];
    const shapes = ["🎉", "✨", "🎊", "⭐"];

    // クーポンコードの位置を取得（目標地点）
    const targetEl = document.getElementById("couponCode");
    const targetRect = targetEl ? targetEl.getBoundingClientRect() : { left: window.innerWidth/2, top: window.innerHeight/2 };
    const targetX = targetRect.left + targetRect.width / 2;
    const targetY = targetRect.top + targetRect.height / 2;

    // 発射元：左下・右下
    const origins = [
      { x: -20, y: window.innerHeight + 20 },               // 左下
      { x: window.innerWidth + 20, y: window.innerHeight + 20 } // 右下
    ];

    origins.forEach(origin => {
      for (let i = 0; i < 35; i++) {
        const conf = document.createElement("div");
        conf.className = "confetti-burst";
        conf.style.left = origin.x + "px";
        conf.style.top = origin.y + "px";
        conf.style.background = colors[Math.floor(Math.random() * colors.length)];
        conf.style.width = conf.style.height = (Math.random() * 8 + 6) + "px";
        conf.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";

        // ターゲット付近にランダムなブレを加える
        const spreadX = targetX + (Math.random() - 0.5) * 300;
        const spreadY = targetY + (Math.random() - 0.5) * 200;

        // 飛び散った後、さらに重力で落ちる距離
        const overshootX = (spreadX - origin.x) * 1.4;
        const overshootY = spreadY - origin.y + 400 + Math.random() * 200;

        conf.style.setProperty('--dx', overshootX + "px");
        conf.style.setProperty('--dy', overshootY + "px");
        conf.style.animationDuration = (Math.random() * 0.6 + 1.2) + "s";
        conf.style.animationDelay = (Math.random() * 0.3) + "s";

        document.body.appendChild(conf);
        setTimeout(() => conf.remove(), 2500);
      }

      // 絵文字も少し混ぜる
      for (let i = 0; i < 5; i++) {
        const emoji = document.createElement("div");
        emoji.className = "emoji-burst";
        emoji.innerText = shapes[Math.floor(Math.random() * shapes.length)];
        emoji.style.left = origin.x + "px";
        emoji.style.top = origin.y + "px";
        emoji.style.fontSize = (Math.random() * 14 + 16) + "px";

        const spreadX = targetX + (Math.random() - 0.5) * 250;
        const spreadY = targetY + (Math.random() - 0.5) * 150;
        const overshootX = (spreadX - origin.x) * 1.4;
        const overshootY = spreadY - origin.y + 400 + Math.random() * 200;

        emoji.style.setProperty('--dx', overshootX + "px");
        emoji.style.setProperty('--dy', overshootY + "px");
        emoji.style.animationDuration = (Math.random() * 0.6 + 1.2) + "s";
        emoji.style.animationDelay = (Math.random() * 0.3) + "s";

        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 2500);
      }
    });
  }

  function onError(err) {
    document.getElementById("submitBtn").disabled = false;
    document.getElementById("result").innerHTML = "<div class='error-box'>エラーが発生しました: " + JSON.stringify(err) + "</div>";
  }

</script>

</body>
</html>
