<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クーポン受け取り</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", Arial, sans-serif;
    background: radial-gradient(ellipse at top, #1a1a1a 0%, #000000 70%);
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }
  .card {
    background: linear-gradient(160deg, #161616 0%, #0a0a0a 100%);
    border-radius: 18px;
    padding: 36px 26px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 0 0 1px rgba(212,175,55,0.3), 0 20px 50px rgba(0,0,0,0.6);
    text-align: center;
    border: 1px solid rgba(212,175,55,0.4);
    position: relative;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 12px;
    pointer-events: none;
  }
  h1 {
    font-size: 19px;
    color: #e8c873;
    margin-bottom: 6px;
    letter-spacing: 1px;
    font-weight: 600;
  }
  p.desc {
    font-size: 13px;
    color: #999;
    margin-bottom: 26px;
    line-height: 1.7;
    letter-spacing: 0.3px;
  }
  input {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    background: #0d0d0d;
    border: 1px solid rgba(212,175,55,0.35);
    color: #f0f0f0;
    border-radius: 8px;
    margin-bottom: 18px;
    letter-spacing: 0.5px;
  }
  input::placeholder { color: #555; }
  input:focus {
    outline: none;
    border-color: #d4af37;
  }
  button {
    width: 100%;
    padding: 15px;
    font-size: 15px;
    font-weight: bold;
    color: #0a0a0a;
    background: linear-gradient(135deg, #f5d98a 0%, #d4af37 50%, #b8932e 100%);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 1px;
    box-shadow: 0 4px 14px rgba(212,175,55,0.3);
  }
  button:disabled { opacity: 0.4; }
  #result { margin-top: 22px; }
  .error-box {
    color: #ff6b6b;
    margin-top: 16px;
    font-size: 13px;
    letter-spacing: 0.3px;
  }
  .loading {
    color: #888;
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  .ticket-wrap {
    margin-top: 20px;
    animation: ticketSlide 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    filter: drop-shadow(0 18px 30px rgba(0,0,0,0.5));
  }
  @keyframes ticketSlide {
    0% { transform: translateY(-40px) scale(0.9) rotate(-3deg); opacity: 0; }
    60% { transform: translateY(4px) scale(1.02) rotate(0.5deg); opacity: 1; }
    100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
  }
  .ticket {
    display: flex;
    background: linear-gradient(155deg, #1c1c1c 0%, #0c0c0c 100%);
    border-radius: 14px;
    position: relative;
    border: 1px solid rgba(212,175,55,0.5);
    overflow: hidden;
  }
  .ticket::after {
    content: "";
    position: absolute;
    top: 0; left: -150%;
    width: 60%;
    height: 100%;
    background: linear-gradient(100deg, transparent, rgba(212,175,55,0.2), transparent);
    animation: shine 3s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes shine {
    0% { left: -150%; }
    50%, 100% { left: 150%; }
  }
  .ticket-main {
    flex: 1;
    padding: 24px 18px 24px 22px;
    text-align: left;
    position: relative;
  }
  .ticket-stub {
    width: 86px;
    flex-shrink: 0;
    padding: 18px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background: rgba(212,175,55,0.04);
  }
  .ticket-perforation {
    width: 0;
    border-left: 2px dashed rgba(212,175,55,0.4);
    position: relative;
  }
  .ticket-perforation::before, .ticket-perforation::after {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    background: #000;
    border-radius: 50%;
    left: -10px;
  }
  .ticket-perforation::before { top: -9px; }
  .ticket-perforation::after { bottom: -9px; }

  .ticket-header {
    font-size: 10px;
    letter-spacing: 3px;
    color: #d4af37;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.85;
  }
  .ticket-congrats {
    font-size: 15px;
    font-weight: bold;
    color: #f5e6b8;
    margin-bottom: 16px;
    letter-spacing: 0.3px;
  }
  .ticket-label {
    font-size: 9px;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .coupon-code {
    font-size: 21px;
    font-weight: bold;
    color: #f5e6b8;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.15s;
    user-select: all;
    padding: 10px 12px;
    border: 1px dashed rgba(212,175,55,0.5);
    border-radius: 8px;
    background: rgba(212,175,55,0.05);
    display: inline-block;
  }
  .coupon-code:active { transform: scale(0.96); }
  .copy-hint {
    font-size: 10px;
    color: #d4af37;
    margin-top: 8px;
    font-weight: bold;
    letter-spacing: 0.5px;
  }
  .ticket-expiry {
    margin-top: 12px;
    font-size: 10px;
    color: #e08a8a;
    font-weight: bold;
    letter-spacing: 0.5px;
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.25);
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
  }

  .ticket-stub-label {
    writing-mode: vertical-rl;
    font-size: 10px;
    letter-spacing: 3px;
    color: #d4af37;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .ticket-barcode {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 38px;
  }
  .ticket-barcode div {
    width: 2px;
    background: rgba(212,175,55,0.6);
  }
  .ticket-num {
    font-size: 8px;
    color: #777;
    letter-spacing: 1px;
    margin-top: 6px;
  }

  .ticket-note {
    font-size: 11px;
    color: #777;
    margin-top: 16px;
    letter-spacing: 0.3px;
    line-height: 1.6;
    text-align: center;
  }

  .flash {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle, rgba(212,175,55,0.5), transparent 70%);
    z-index: 998;
    pointer-events: none;
    animation: flash-fade 0.6s ease-out forwards;
  }
  @keyframes flash-fade { to { opacity: 0; } }
</style>
</head>
<body>

<div class="card">
  <h1>🎁 期間限定クーポン 🎁</h1>
  <p class="desc">SNSの投稿に掲載されているキーワードを入力してください</p>

  <div id="formArea">
    <input type="text" id="keywordInput" placeholder="キーワードを入力">
    <button id="submitBtn" onclick="submitKeyword()">送信する</button>
  </div>

  <div id="result"></div>
</div>

<script>
  let userId = "";
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxGO-eJaWiJUO1Us2aP2vPUvlTSW-u7Z2q74NpUZWS2GuZqFrUnXcRwA6zt6hAIQ5lc/exec";

  document.getElementById("result").innerHTML = "<p class='loading'>LIFF初期化中...</p>";

  liff.init({ liffId: "2010460051-Ad6VtlEi" }).then(() => {
    if (!liff.isLoggedIn()) {
      liff.login();
    } else {
      liff.getProfile().then(profile => {
        userId = profile.userId;
        document.getElementById("result").innerHTML = "";
      }).catch(err => {
        document.getElementById("result").innerHTML = "<div class='error-box'>プロフィール取得エラー: " + JSON.stringify(err) + "</div>";
      });
    }
  }).catch(err => {
    document.getElementById("result").innerHTML = "<div class='error-box'>初期化エラー: " + JSON.stringify(err) + "</div>";
  });

  function submitKeyword() {
    const keyword = document.getElementById("keywordInput").value.trim();
    if (!keyword) {
      alert("キーワードを入力してください");
      return;
    }
    if (!userId) {
      alert("ユーザー情報の取得中です。少し待ってから再度お試しください。");
      return;
    }

    document.getElementById("submitBtn").disabled = true;
    document.getElementById("result").innerHTML = "<p class='loading'>確認中...</p>";

    fetch(GAS_API_URL, {
      method: "POST",
      body: JSON.stringify({ userId: userId, keyword: keyword }),
      headers: { "Content-Type": "text/plain" }
    })
      .then(res => res.json())
      .then(onResult)
      .catch(onError);
  }

  function randomBarcode() {
    let bars = "";
    for (let i = 0; i < 14; i++) {
      const h = Math.floor(Math.random() * 24 + 10);
      bars += `<div style="height:${h}px"></div>`;
    }
    return bars;
  }

  function randomTicketNum() {
    return "NO." + Math.floor(Math.random() * 900000 + 100000);
  }

  function onResult(res) {
    document.getElementById("submitBtn").disabled = false;

    if (res.success) {
      document.getElementById("formArea").style.display = "none";
      document.getElementById("result").innerHTML = `
        <div class="ticket-wrap">
          <div class="ticket">
            <div class="ticket-main">
              <div class="ticket-header">VIP COUPON</div>
              <div class="ticket-congrats">🎉 おめでとうございます</div>
              <div class="ticket-label">割引内容</div>
              <div style="font-size:26px;font-weight:900;background:linear-gradient(135deg,#f5d98a,#d4af37,#f5d98a);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:14px;">${res.discount || "特典クーポン"}</div>
              <div class="ticket-label">COUPON CODE</div>
              <div class="coupon-code" id="couponCode" onclick="copyCoupon()">${res.couponCode}</div>
              <p class="copy-hint" id="copyHint">タップしてコピー 📋</p>
              ${res.expiryText ? `<div class="ticket-expiry">有効期限：${res.expiryText}</div>` : ""}
            </div>
            <div class="ticket-perforation"></div>
            <div class="ticket-stub">
              <div class="ticket-stub-label">SANKI</div>
              <div class="ticket-barcode">${randomBarcode()}</div>
              <div class="ticket-num">${randomTicketNum()}</div>
            </div>
          </div>
        </div>
        <p class="ticket-note">このコードを自社サイトのクーポン欄に入力してください</p>
      `;
      launchConfettiBurst();
      launchFlash();
    } else {
      document.getElementById("result").innerHTML = "<div class='error-box'>" + res.message + "</div>";
    }
  }

  function copyCoupon() {
    const code = document.getElementById("couponCode").innerText;
    navigator.clipboard.writeText(code).then(() => {
      const hint = document.getElementById("copyHint");
      hint.innerText = "✅ コピーしました！";
      hint.style.color = "#7ed957";
      setTimeout(() => {
        hint.innerText = "タップしてコピー 📋";
        hint.style.color = "";
      }, 2000);
    });
  }

  function launchFlash() {
    const flash = document.createElement("div");
    flash.className = "flash";
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 600);
  }

  function launchConfettiBurst() {
    const colors = ["#d4af37", "#f5d98a", "#b8932e", "#fff5d6", "#e8c873", "#fffbe6"];
    const shapes = ["✨", "🎉", "⭐", "🎊", "💫"];

    const targetEl = document.getElementById("couponCode");
    let targetX = window.innerWidth / 2;
    let targetY = window.innerHeight / 2;
    if (targetEl) {
      const rect = targetEl.getBoundingClientRect();
      targetX = rect.left + rect.width / 2;
      targetY = rect.top + rect.height / 2;
    }

    // 画面内、下端付近に発射位置を設定（見切れ防止）
    const originLeft = { x: window.innerWidth * 0.1, y: window.innerHeight * 0.95 };
    const originRight = { x: window.innerWidth * 0.9, y: window.innerHeight * 0.95 };

    burstFrom(originLeft, targetX, targetY, colors, shapes);
    setTimeout(() => burstFrom(originRight, targetX, targetY, colors, shapes), 80);

    setTimeout(() => sparkleAround(targetX, targetY, colors), 700);
  }

  function burstFrom(origin, targetX, targetY, colors, shapes) {
    const particleCount = 80;

    for (let i = 0; i < particleCount; i++) {
      const el = document.createElement("div");
      const kind = Math.random();
      const isRibbon = kind > 0.7;
      const isSpark = kind > 0.55 && kind <= 0.7;
      const size = isRibbon ? (Math.random() * 5 + 7) : (Math.random() * 6 + 4);

      el.style.position = "fixed";
      el.style.left = origin.x + "px";
      el.style.top = origin.y + "px";
      el.style.zIndex = "999";
      el.style.pointerEvents = "none";
      el.style.willChange = "transform, opacity";

      if (isSpark) {
        el.style.width = (size * 0.6) + "px";
        el.style.height = (size * 0.6) + "px";
        el.style.background = "#fffbe6";
        el.style.borderRadius = "50%";
        el.style.boxShadow = "0 0 6px 1px rgba(255,245,200,0.9)";
      } else if (isRibbon) {
        el.style.width = size + "px";
        el.style.height = (size * 2.6) + "px";
        el.style.borderRadius = "2px";
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
      } else {
        el.style.width = size + "px";
        el.style.height = size + "px";
        el.style.borderRadius = Math.random() > 0.5 ? "50%" : "1px";
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
      }

      document.body.appendChild(el);

      const angleSpreadDeg = (Math.random() - 0.5) * 50;
      const baseAngle = Math.atan2(targetY - origin.y, targetX - origin.x);
      const angle = baseAngle + (angleSpreadDeg * Math.PI / 180);
      const power = 420 + Math.random() * 260;

      const midX = origin.x + Math.cos(angle) * power;
      const midY = origin.y + Math.sin(angle) * power;

      const driftX = (Math.random() - 0.5) * 200;
      const finalX = midX + driftX;
      const finalY = midY + 480 + Math.random() * 320;

      const upDuration = 600 + Math.random() * 350;
      const downDuration = 1300 + Math.random() * 900;
      const totalRotate = 280 + Math.random() * 640;

      el.animate([
        { transform: `translate(0px,0px) rotate(0deg)`, opacity: 1, offset: 0 },
        { transform: `translate(${midX - origin.x}px, ${midY - origin.y}px) rotate(${totalRotate * 0.4}deg)`, opacity: 1, offset: upDuration / (upDuration + downDuration) },
        { transform: `translate(${finalX - origin.x}px, ${finalY - origin.y}px) rotate(${totalRotate}deg)`, opacity: 0, offset: 1 }
      ], {
        duration: upDuration + downDuration,
        easing: "cubic-bezier(0.16, 0.84, 0.44, 1)",
        fill: "forwards"
      });

      setTimeout(() => el.remove(), upDuration + downDuration + 100);
    }

    for (let i = 0; i < 7; i++) {
      const emoji = document.createElement("div");
      emoji.innerText = shapes[Math.floor(Math.random() * shapes.length)];
      emoji.style.position = "fixed";
      emoji.style.left = origin.x + "px";
      emoji.style.top = origin.y + "px";
      emoji.style.fontSize = (15 + Math.random() * 16) + "px";
      emoji.style.zIndex = "999";
      emoji.style.pointerEvents = "none";
      document.body.appendChild(emoji);

      const baseAngle = Math.atan2(targetY - origin.y, targetX - origin.x);
      const angle = baseAngle + ((Math.random() - 0.5) * 40 * Math.PI / 180);
      const power = 400 + Math.random() * 220;
      const midX = origin.x + Math.cos(angle) * power;
      const midY = origin.y + Math.sin(angle) * power;
      const finalX = midX + (Math.random() - 0.5) * 150;
      const finalY = midY + 420 + Math.random() * 260;

      const upDuration = 600 + Math.random() * 300;
      const downDuration = 1200 + Math.random() * 700;

      emoji.animate([
        { transform: `translate(0px,0px) rotate(0deg)`, opacity: 1, offset: 0 },
        { transform: `translate(${midX - origin.x}px, ${midY - origin.y}px) rotate(160deg)`, opacity: 1, offset: upDuration / (upDuration + downDuration) },
        { transform: `translate(${finalX - origin.x}px, ${finalY - origin.y}px) rotate(420deg)`, opacity: 0, offset: 1 }
      ], {
        duration: upDuration + downDuration,
        easing: "cubic-bezier(0.16, 0.84, 0.44, 1)",
        fill: "forwards"
      });

      setTimeout(() => emoji.remove(), upDuration + downDuration + 100);
    }
  }

  function sparkleAround(cx, cy, colors) {
    for (let i = 0; i < 14; i++) {
      const el = document.createElement("div");
      const size = Math.random() * 4 + 2;
      el.style.position = "fixed";
      el.style.left = (cx + (Math.random() - 0.5) * 220) + "px";
      el.style.top = (cy + (Math.random() - 0.5) * 140) + "px";
      el.style.width = size + "px";
      el.style.height = size + "px";
      el.style.borderRadius = "50%";
      el.style.background = "#fffbe6";
      el.style.boxShadow = "0 0 8px 2px rgba(255,245,200,0.95)";
      el.style.zIndex = "999";
      el.style.pointerEvents = "none";
      document.body.appendChild(el);

      const duration = 900 + Math.random() * 600;
      el.animate([
        { transform: "scale(0) translateY(0px)", opacity: 0, offset: 0 },
        { transform: "scale(1.2) translateY(-10px)", opacity: 1, offset: 0.4 },
        { transform: "scale(0.4) translateY(-25px)", opacity: 0, offset: 1 }
      ], { duration: duration, easing: "ease-out", fill: "forwards" });

      setTimeout(() => el.remove(), duration + 100);
    }
  }

  function onError(err) {
    document.getElementById("submitBtn").disabled = false;
    document.getElementById("result").innerHTML = "<div class='error-box'>エラーが発生しました: " + JSON.stringify(err) + "</div>";
  }
</script>

</body>
</html>
